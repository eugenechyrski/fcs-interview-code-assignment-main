name: Java CI with Maven + JaCoCo

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Run Maven tests and generate JaCoCo exec
        run: mvn -B clean verify jacoco:report
        working-directory: ./java-assignment

      - name: Show JaCoCo coverage in console
        uses: dorny/paths-filter@v2

      - name: Jacoco Action
        uses: devops-infra/action-jacoco@v1
        with:
          report_path: './java-assignment/target/site/jacoco/jacoco.xml'