openapi: 3.0.0
info:
  title: Warehouse API
  description: API for managing products in a warehouse
  version: 1.0.0

paths:
  /fulfilment:
    post:
      summary: Assign a product to a store via a warehouse
      operationId: assignFulfilment
      tags:
        - Fulfilment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WarehouseFulfilmentRequest'
      responses:
        '201':
          description: Fulfilment successfully assigned
        '400':
          description: Bad request (constraint violation)
        '500':
          description: Internal server error
  /warehouse:
    get:
      summary: List all warehouses units
      responses:
        '200':
          description: A list of warehouse units
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Warehouse'
    post:
      summary: Create a new warehouse unit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Warehouse'
      responses:
        '201':
          description: Warehouse unit created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
        
        '400':
          description: Invalid request parameters
        '404':
          description: Location not found

  /warehouse/{id}:
    get:
      summary: Get a warehouse unit by ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the warehouse unit to get
          schema:
            type: string
      responses:
        '200':
          description: Warehouse unit found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
        '404':
          description: Warehouse unit or location not found
    delete:
      summary: Archive a warehouse unit by ID
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the warehouse unit to archive
          schema:
            type: string
      responses:
        '204':
          description: Warehouse unit archived
        '404':
          description: Warehouse unit not found

  /warehouse/{businessUnitCode}/replacement:
    post:
      summary: Replace the current active Warehouse
      description: | 
        Replaces the current active Warehouse identified by `businessUnitCode` unit by a new Warehouse provided in the request body
        A Warehouse can be replaced by another Warehouse with the same Business Unit Code. 
        That means that the previous Warehouse will be archived and the new Warehouse will be created assuming its place.
      parameters:
        - name: businessUnitCode
          in: path
          required: true
          description: Business unit code of the warehouse unit to replace
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Warehouse'
      responses:
        '200':
          description: Warehouse unit replaced
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Warehouse'
        '404':
          description: Warehouse unit or location not found

        '400':
          description: Invalid request parameters
components:
  schemas:
    WarehouseFulfilmentRequest:
      type: object
      required:
        - product
        - store
        - warehouse
      properties:
        product:
          type: string
          example: ProductA
          description: Name or code of the product
        store:
          type: string
          example: Store1
          description: Name or code of the store
        warehouse:
          type: string
          example: Warehouse1
          description: Name or code of the warehouse
    Warehouse:
      type: object
      properties:
        id:
          required: false
          type: string
          example: "456"
        businessUnitCode:
          required: true
          type: string
          example: "MWH.001"
        location:
          required: true
          type: string
          example: "AMSTERDAM-001"
        capacity:
          required: true
          type: integer
          example: 100
        stock:
          required: true
          type: integer
          example: 50
